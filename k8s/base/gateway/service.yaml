apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: triton
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9090
      targetPort: 9090
  # LoadBalancer — external IP, this is how clients outside the cluster connect
  type: LoadBalancer

apiVersion: v1
kind: ServiceAccount
metadata:
  name: triton-server
  namespace: triton
  annotations:
    # Workload Identity — maps this k8s SA to the GCP SA we created in Terraform.
    # This is how Triton reads models from GCS without a static key file.
    iam.gke.io/gcp-service-account: vision-serving-triton-sa@vision-serving-platform.iam.gserviceaccount.com

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# Dev: single replica, lower resources, FP32 model (no GPU needed for testing)
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: gateway
  - patch: |-
      - op: replace
        path: /data/MODEL_DEFAULT_VIT_VERSION
        value: "fp32"
    target:
      kind: ConfigMap
      name: gateway-config

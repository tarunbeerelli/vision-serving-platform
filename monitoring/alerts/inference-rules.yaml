apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: inference-alerts
  namespace: monitoring
  labels:
    # This label makes kube-prometheus-stack pick up the rule
    release: kube-prometheus-stack
spec:
  groups:
    - name: inference.rules
      interval: 30s
      rules:
        # P99 latency alert — fires if 99th percentile > 500ms
        - alert: HighInferenceLatency
          expr: |
            histogram_quantile(0.99,
              rate(gateway_inference_latency_ms_bucket[5m])
            ) > 500
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "P99 inference latency > 500ms"
            description: "P99 latency is {{ $value }}ms over the last 5 minutes"

        # Error rate alert — fires if >5% of requests are errors
        - alert: HighInferenceErrorRate
          expr: |
            rate(gateway_inference_requests_total{status="error"}[5m])
            /
            rate(gateway_inference_requests_total[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Inference error rate > 5%"
            description: "Error rate is {{ $value | humanizePercentage }}"

        # Prediction drift alert — fires if any single class > 60% of predictions
        # This catches model degradation or upstream data issues
        - alert: PredictionDrift
          expr: |
            rate(gateway_prediction_class_total[10m])
            /
            sum(rate(gateway_prediction_class_total[10m])) > 0.6
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prediction distribution drift detected"
            description: "Class {{ $labels.class_id }} represents >60% of predictions"

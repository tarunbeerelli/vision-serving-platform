name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run ruff check src tests
      - run: poetry run ruff format --check src tests
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.32.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run pytest tests/unit tests/smoke -v --tb=short

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=terraform validate

  build-push:
    name: Build + Push
    runs-on: ubuntu-latest
    needs: [test, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/tarunbeerelli/vision-serving-platform:${{ github.sha }}
            ghcr.io/tarunbeerelli/vision-serving-platform:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: vision-serving
          location: europe-west4
          project_id: vision-serving-platform

      - name: Apply k8s manifests
        run: kubectl apply -k k8s/overlays/prod

      - name: Deploy gateway image
        run: |
          kubectl set image deployment/gateway \
            gateway=ghcr.io/tarunbeerelli/vision-serving-platform:${{ github.sha }} \
            -n triton

          kubectl rollout status deployment/gateway \
            -n triton \
            --timeout=900s
